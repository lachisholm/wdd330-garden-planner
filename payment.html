<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Header and nav injected by inject-header-footer.js -->
  <main>
    <section class="feature-card">
      <h2>Payment Options</h2>
      <form id="payment-form">
        <div class="payment-methods">
          <label><input type="radio" name="method" value="credit" checked> Credit Card</label><br>
          <label><input type="radio" name="method" value="paypal"> PayPal</label><br>
          <label><input type="radio" name="method" value="applepay"> Apple Pay</label><br>
        </div>
        <div class="payment-details" id="credit-details">
          <label>Card Number:<br><input type="text" name="cardNumber" maxlength="19" required></label><br>
          <label>Expiry Date:<br><input type="text" name="expiry" placeholder="MM/YY" maxlength="5" required></label><br>
          <label>CVV:<br><input type="text" name="cvv" maxlength="4" required></label><br>
        </div>
        <button type="submit" class="checkout-btn">Pay Now</button>
      </form>
      <div id="payment-message"></div>
    </section>
  </main>
  <!-- Footer injected by inject-header-footer.js -->
  <script type="module" src="js/payment.js"></script>
  <script type="module" src="js/inject-header-footer.js"></script>
</body>
</html>
