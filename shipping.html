<!-- Document type declaration -->
<!DOCTYPE html>
<!-- Root HTML element with language attribute -->
<html lang="en">
<!-- Head section starts -->
<head>
  <!-- Character encoding for the document -->
  <meta charset="UTF-8">
  <!-- Responsive viewport settings -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Page title -->
  <title>Shipping</title>
  <!-- Link to external stylesheet -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<!-- Body section starts -->
<body>
  <!-- Header and nav injected by inject-header-footer.js -->
  <!-- Main content area -->
  <main>
    <!-- Section for shipping details -->
    <section class="feature-card">
      <!-- Section heading -->
      <h2 style="text-align:center;">Shipping</h2>
      <!-- Shipping form for user input -->
      <form id="shipping-form" class="shipping-form">
        <!-- Label for buyer name input -->
        <label for="buyer-name">Name:</label>
        <!-- Input for buyer name -->
        <input type="text" id="buyer-name" name="buyer-name" required>
        <!-- Label for address input -->
        <label for="address">Address:</label>
        <!-- Input for address -->
        <input type="text" id="address" name="address" required>
        <!-- Label for city input -->
        <label for="city">City:</label>
        <!-- Input for city -->
        <input type="text" id="city" name="city" required>
        <!-- Label for state input -->
        <label for="state">State:</label>
        <!-- Dropdown for state selection -->
        <select id="state" name="state" required>
          <option value="">Select State</option>
          <option value="AL">Alabama</option>
          <option value="AK">Alaska</option>
          <option value="AZ">Arizona</option>
          <option value="AR">Arkansas</option>
          <option value="CA">California</option>
          <option value="CO">Colorado</option>
          <option value="CT">Connecticut</option>
          <option value="DE">Delaware</option>
          <option value="FL">Florida</option>
          <option value="GA">Georgia</option>
          <option value="HI">Hawaii</option>
          <option value="ID">Idaho</option>
          <option value="IL">Illinois</option>
          <option value="IN">Indiana</option>
          <option value="IA">Iowa</option>
          <option value="KS">Kansas</option>
          <option value="KY">Kentucky</option>
          <option value="LA">Louisiana</option>
          <option value="ME">Maine</option>
          <option value="MD">Maryland</option>
          <option value="MA">Massachusetts</option>
          <option value="MI">Michigan</option>
          <option value="MN">Minnesota</option>
          <option value="MS">Mississippi</option>
          <option value="MO">Missouri</option>
          <option value="MT">Montana</option>
          <option value="NE">Nebraska</option>
          <option value="NV">Nevada</option>
          <option value="NH">New Hampshire</option>
          <option value="NJ">New Jersey</option>
          <option value="NM">New Mexico</option>
          <option value="NY">New York</option>
          <option value="NC">North Carolina</option>
          <option value="ND">North Dakota</option>
          <option value="OH">Ohio</option>
          <option value="OK">Oklahoma</option>
          <option value="OR">Oregon</option>
          <option value="PA">Pennsylvania</option>
          <option value="RI">Rhode Island</option>
          <option value="SC">South Carolina</option>
          <option value="SD">South Dakota</option>
          <option value="TN">Tennessee</option>
          <option value="TX">Texas</option>
          <option value="UT">Utah</option>
          <option value="VT">Vermont</option>
          <option value="VA">Virginia</option>
          <option value="WA">Washington</option>
          <option value="WV">West Virginia</option>
          <option value="WI">Wisconsin</option>
          <option value="WY">Wyoming</option>
        </select>
        <!-- Label for ZIP code input -->
        <label for="zip">ZIP Code:</label>
        <!-- Input for ZIP code -->
        <input type="text" id="zip" name="zip" required>
        <!-- Country dropdown -->
        <label for="country">Country:</label>
        <select id="country" name="country">
          <option value="USA">USA</option>
        </select>
        <!-- Message for country restriction -->
        <div id="country-message" style="display:none; color:#c0392b; font-weight:bold; margin-top:8px;"></div>
        <!-- Submit button for shipping form -->
        <button type="submit" class="checkout-btn">Submit Shipping</button>
      </form>
      <!-- Message area for shipping status -->
      <div id="shipping-message" class="message"></div>
    </section>
  </main>
  <!-- Script for header/footer injection -->
  <script type="module" src="js/inject-header-footer.js"></script>
  <!-- Script for shipping functionality -->
  <script type="module" src="js/shipping.js"></script>
  <!-- Script to show country restriction message -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const countrySelect = document.getElementById('country');
      const countryMsg = document.getElementById('country-message');
      if (countrySelect) {
        countrySelect.addEventListener('click', function() {
          countryMsg.style.display = 'block';
          countryMsg.textContent = 'We currently only ship to the USA. Sorry for the inconvenience.';
          setTimeout(() => {
            countryMsg.style.display = 'none';
          }, 20000);
        });
      }
    });
  </script>
</body>
</html>
